                 },

                },
            // الثيم الافتراضي هو الخاص بصورة السماء التي رفعتها
            default: {
                bgDesktop: "normal.png",
                bgMobile: "normal.png",

        };

        const ramadanDuas = {
            1: "اللَّهُمَّ اجْعَلْ صِيَامِي فِيهِ صِيَامَ الصَّائِمِينَ، وَقِيَامِي فِيهِ قِيَامَ الْقَائِمِينَ، وَنَبِّهْنِي فِيهِ عَنْ نَوْمَةِ الْغَافِلِينَ...",
            // أضف بقية الأيام هنا
        };

        // قاعدة بيانات المناسبات (الشهر-اليوم)
        const hijriEvents = {
            "01-02": ["• "],
            "01-10": ["• ذكرى عاشوراء استشهاد الإمام الحسين (ع)"],

            "07-13": ["• ولادة أمير المؤمنين الإمام علي (ع)"],

            "09-21": ["• استشهاد أمير المؤمنين (ع)", "• ليلة القدر الثالثة"],

            "10-01":["•عـيـد الـفـطـر الـمـبـارك"],
            "10-": ["• "],


        };

        const myCustomDays = [
    "الأحـــــد", 
    "الأثــــنــــيــــن", 
    "الـــثـــلاثـــاء", 
    "الأربـــعـــاء", 
    "الخـــمـــيـــس", 
    "الجـــمـــعـــة", 
    "الـــســــبــــت"
    ];

        // --- دوال الوقت ---
      function timeToMinutes(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
        
        function minTo12(m) {
            let h = Math.floor(m / 60) % 24;
            const ap = h >= 12 ? 'م' : 'ص';
            h = h % 12 || 12;
            let timeStr = `${String(h).padStart(2, '0')}:${String(Math.round(m % 60)).padStart(2, '0')} ${ap}`;
            return toArabicDigits(timeStr); 
        }

        async function fetchPrayers(city) {
            try {
                const url = `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=SA&method=99&methodSettings=16.0,null,null&adjustment=${hijriOffset}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.code === 200) {
                    const t = data.data.timings;
                    const h = data.data.date.hijri;
                    const hMonth = parseInt(h.month.number);
                    const hDay = parseInt(h.day);

                    document.getElementById('Imsak').innerText = minTo12(timeToMinutes(t.Imsak));
                    document.getElementById('Fajr').innerText = minTo12(timeToMinutes(t.Fajr));
                    document.getElementById('Sunrise').innerText = minTo12(timeToMinutes(t.Sunrise));
                    document.getElementById('Dhuhr').innerText = minTo12(timeToMinutes(t.Dhuhr));
                    document.getElementById('Sunset').innerText = minTo12(timeToMinutes(t.Sunset));
                    document.getElementById('Maghrib').innerText = minTo12(timeToMinutes(t.Sunset) + 15);
                    document.getElementById('Midnight').innerText = minTo12(timeToMinutes(t.Sunset) + (timeToMinutes(t.Fajr) + 1440 - timeToMinutes(t.Sunset)) / 2);

                    const arabicDay = toArabicDigits(h.day);
                    const arabicYear = toArabicDigits(h.year);
                    document.getElementById('hijri-date').innerText = `${arabicDay} ${h.month.ar} ${arabicYear} هـ`;
                    document.getElementById('day-name').innerText = myCustomDays[new Date().getDay()];
                    document.getElementById('city-name').innerText = city;

                    const theme = themesSettings[hMonth] || themesSettings.default;
                    const root = document.documentElement;
                    root.style.setProperty('--theme-color', theme.mainColor);
                    root.style.setProperty('--theme-overlay', theme.overlayColor);
                    const bg = window.innerWidth > 768 ? theme.bgDesktop : theme.bgMobile;
                    root.style.setProperty('--bg-desktop', `url('${bg}')`);
                    root.style.setProperty('--bg-mobile', `url('${bg}')`);

                    const duaBox = document.getElementById('daily-dua-container');
                    if(hMonth === 9) {
                        duaBox.style.display = 'block';
                        document.getElementById('daily-dua-text').innerText = ramadanDuas[hDay] || "تقبل الله طاعاتكم.";
                    } else { duaBox.style.display = 'none'; }

                    const key = `${String(hMonth).padStart(2, '0')}-${String(hDay).padStart(2, '0')}`;
                    const evs = hijriEvents[key];
                    document.getElementById('event-content').innerHTML = evs ? evs.map(e => `<p>${e}</p>`).join('') : `<p style="opacity:0.6">لا توجد مناسبات مسجلة.</p>`;
                }
            } catch (e) { console.error(e); }
        }

        function openModal() { document.getElementById('city-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('city-modal').style.display = 'none'; }
        function saveCity() {
            const v = document.getElementById('city-input').value.trim();
            if(v) { localStorage.setItem('userCity', v); fetchPrayers(v); closeModal(); }
        }

        fetchPrayers(localStorage.getItem('userCity') || 'Qatif');
        fetchPrayers(savedCity);

let currentCounter = 0;
let isCountdownMode = false;

// دالة تحويل الأرقام (تأكد أنها في بداية السكربت)
function toArabicDigits(num) {
    if (num === null || num === undefined) return "٠";
    const id = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
    return num.toString().replace(/[0-9]/g, function(w) {
        return id[+w];
    });
}

// دالة تحديث شكل الدائرة
function updateCircleDisplay() {
    const circle = document.getElementById('subha-circle');
    if (circle) {
        circle.innerText = toArabicDigits(currentCounter);
    }
}

// دالة فتح النافذة
function openSubhaModal() {
    document.getElementById('subha-modal').style.display = 'flex';
}

// دالة إغلاق النافذة
function closeSubhaModal() {
    document.getElementById('subha-modal').style.display = 'none';
}

// دالة الزر "موافق" (ضبط العد التنازلي)
function setSubha() {
    const inputField = document.getElementById('subha-input');
    const val = parseInt(inputField.value);
    
    if (!isNaN(val) && val > 0) {
        currentCounter = val;
        isCountdownMode = true;
        updateCircleDisplay();
        inputField.value = ""; // تفريغ الخانة بعد التأكيد
    } else {
        alert("يرجى إدخال رقم صحيح أكبر من صفر");
    }
}

// دالة الضغط على الدائرة (الزيادة أو النقصان)
function handleSubhaClick() {
    if (isCountdownMode) {
        if (currentCounter > 0) {
            currentCounter--;
        }
        // إذا وصل للصفر ينتهي وضع التنازلي ويرجع للزيادة
        if (currentCounter === 0) {
            isCountdownMode = false;
        }
    } else {
        currentCounter++;
    }
    updateCircleDisplay();
}
    </script>
